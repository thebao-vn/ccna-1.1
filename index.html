        function App() {
            const [selectedDevice, setSelectedDevice] = React.useState(devices.router);
            const [activeScenario, setActiveScenario] = React.useState(null);
            const [packetPos, setPacketPos] = React.useState(null);
            const [currentStep, setCurrentStep] = React.useState(-1);
            const [isPlaying, setIsPlaying] = React.useState(false);

            // Cập nhật icon lúc đầu render nếu cần
            React.useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, []);

            // Animation effect for topology
            React.useEffect(() => {
                let timer;
                if (isPlaying && activeScenario && currentStep < activeScenario.path.length) {
                    const deviceId = activeScenario.path[currentStep];
                    const device = devices[deviceId];
                    
                    setPacketPos({ x: device.x, y: device.y });
                    setSelectedDevice(device);

                    timer = setTimeout(() => {
                        if (currentStep === activeScenario.path.length - 1) {
                            setIsPlaying(false); // End of path
                        } else {
                            setCurrentStep(prev => prev + 1);
                        }
                    }, 4000); // 4s per hop (chậm hơn để đọc giải thích dài)
                }
                return () => clearTimeout(timer);
            }, [isPlaying, currentStep, activeScenario]);

            const startSimulation = (scenario) => {
                setActiveScenario(scenario);
                setCurrentStep(0);
                setIsPlaying(true);
                const firstDevice = devices[scenario.path[0]];
                setPacketPos({ x: firstDevice.x, y: firstDevice.y });
                setSelectedDevice(firstDevice);
            };

            const stopSimulation = () => {
                setIsPlaying(false);
                setPacketPos(null);
                setCurrentStep(-1);
                setActiveScenario(null);
            };

            return (
                <div className="flex flex-col h-screen w-full bg-slate-100 font-sans text-slate-800">

                        <div className="ml-auto text-sm text-indigo-200">Lab: Chức năng thiết bị mạng cơ bản</div>

                    <div className="flex flex-col lg:flex-row flex-1 overflow-hidden">
                        
                        {/* LEFT PANEL: NETWORK TOPOLOGY */}
                        <div className="lg:w-[60%] flex flex-col p-4 relative bg-white border-r border-slate-200 shadow-inner">
                            <h2 className="text-lg font-bold text-slate-700 flex items-center gap-2 mb-2 shrink-0 z-30 pt-2 pl-2">
                                Mô Hình Mạng Doanh Nghiệp
                            </h2>
                            
                            {/* Network Canvas (Scrollable on small screens if needed) */}
                            <div className="flex-1 overflow-auto relative flex items-center justify-center">
                                <div className="relative w-[800px] h-[650px] scale-[0.6] sm:scale-75 md:scale-90 lg:scale-100 transform origin-center">
                                    
                                    {/* Background zones */}
                                    <div className="absolute top-[500px] left-[50px] w-[350px] h-[150px] bg-blue-50 rounded-3xl border-2 border-blue-200 border-dashed opacity-70 pointer-events-none"></div>
                                    <div className="absolute top-[500px] left-[500px] w-[200px] h-[150px] bg-green-50 rounded-3xl border-2 border-green-200 border-dashed opacity-70 pointer-events-none"></div>
                                    <div className="absolute top-[510px] left-[70px] text-blue-500 font-bold uppercase text-xs">VLAN 10: Kế toán</div>
                                    <div className="absolute top-[510px] left-[520px] text-green-500 font-bold uppercase text-xs">VLAN 20: Khách (Wi-Fi)</div>

                                    {/* Draw Lines */}
                                    <svg className="absolute top-0 left-0 w-full h-full pointer-events-none">
                                        {links.map((link, idx) => {
                                            const src = devices[link.source];
                                            const tgt = devices[link.target];
                                            return (
                                                <line
                                                    key={idx}
                                                    x1={src.x}
                                                    y1={src.y}
                                                    x2={tgt.x}
                                                    y2={tgt.y}
                                                    stroke={link.dashed ? "#cbd5e1" : "#94a3b8"}
                                                    strokeWidth="3"
                                                    strokeDasharray={link.dashed ? "6,6" : "none"}
                                                />
                                            );
                                        })}
                                    </svg>

                                    {/* Draw Devices */}
                                    {Object.values(devices).map((device) => {
                                        const Icon = device.icon;
                                        const isSelected = selectedDevice?.id === device.id;
                                        const isPulsing = isPlaying && activeScenario?.path[currentStep] === device.id;

                                        return (
                                            <div
                                                key={device.id}
                                                onClick={() => setSelectedDevice(device)}
                                                className={`absolute transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center cursor-pointer transition-all duration-300 z-10
                                                    ${isSelected ? 'scale-110 z-20' : 'hover:scale-105'}`}
                                                style={{ left: device.x, top: device.y }}
                                            >
                                                <div className={`relative transition-all rounded-xl p-1 w-16 h-16 bg-white
                                                    ${isSelected ? 'ring-4 ring-indigo-300 shadow-xl' : 'drop-shadow-md'}
                                                    ${isPulsing ? 'animate-pulse ring-4 ring-yellow-400 bg-yellow-50' : ''}
                                                `}>
                                                    <Icon />
                                                </div>
                                                <span className={`mt-2 text-xs font-bold px-2 py-1 rounded-md bg-white border shadow-sm whitespace-nowrap
                                                    ${isSelected ? 'text-indigo-700 border-indigo-400' : 'text-slate-600 border-slate-200'}
                                                    ${isPulsing ? 'bg-yellow-100 border-yellow-400 text-yellow-800' : ''}
                                                `}>
                                                    {device.name}
                                                </span>
                                            </div>
                                        );
                                    })}

                                    {/* Draw Packet (Animation) */}
                                    {packetPos && (
                                        <div 
                                            className="absolute transform -translate-x-1/2 -translate-y-1/2 w-6 h-6 bg-yellow-400 rounded-full border-2 border-white shadow-[0_0_15px_rgba(250,204,21,0.8)] transition-all duration-[2000ms] ease-in-out z-50 flex items-center justify-center"
                                            style={{ left: packetPos.x, top: packetPos.y }}
                                        >
                                            <div className="w-2 h-2 bg-yellow-800 rounded-full animate-ping"></div>
                                        </div>
                                    )}
                                </div>
                            </div>
                            
                            <div className="absolute top-4 right-4 text-xs font-semibold text-slate-500 bg-white/90 p-2 rounded shadow backdrop-blur flex items-center gap-2 border border-slate-200">
                                <IconComponent name="info" size={16}/> Click vào thiết bị bất kỳ để xem chức năng
                            </div>
                        </div>

                        {/* RIGHT PANEL: INFO & MINDMAP SIMULATION */}
                        <div className="lg:w-[40%] bg-slate-50 flex flex-col h-full z-20 overflow-hidden">
                            
                            {/* Device Information Section - Nửa trên */}
                            <div className="h-1/2 p-6 bg-white border-b border-slate-200 shadow-sm overflow-y-auto shrink-0 flex flex-col relative">
                                {/* Dải màu trang trí phía trên */}
                                <div className="absolute top-0 left-0 w-full h-1 bg-indigo-500"></div>
                                
                                <h3 className="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4 border-b pb-2">Thông tin thiết bị chọn</h3>
                                
                                <div className="flex items-start gap-4 mb-4">
                                    <div className={`w-16 h-16 p-2 rounded-xl bg-slate-50 border border-slate-200 shadow flex items-center justify-center shrink-0`}>
                                        {selectedDevice && <selectedDevice.icon />}
                                    </div>
                                    <div>
                                        <h3 className="text-2xl font-bold text-slate-800 leading-tight">{selectedDevice.name}</h3>
                                        <div className="inline-block px-2 py-0.5 mt-2 text-xs font-bold text-indigo-700 bg-indigo-100 rounded-full border border-indigo-200">
                                            Role: {selectedDevice.type}
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="space-y-4">
                                    <div>
                                        <h4 className="font-semibold text-slate-700 mb-1 text-sm">Định nghĩa ngắn gọn:</h4>
                                        <p className="text-slate-600 text-sm bg-slate-50 p-3 rounded-lg border border-slate-100">
                                            {selectedDevice.desc}
                                        </p>
                                    </div>
                                    
                                    <div>
                                        <h4 className="font-semibold text-slate-700 mb-1 text-sm flex items-center gap-1">
                                            <IconComponent name="info" size={14} className="text-blue-500"/> Giải thích chi tiết & Thực tế:
                                        </h4>
                                        <p className="text-slate-700 text-sm leading-relaxed bg-blue-50/50 p-4 rounded-lg border border-blue-100 text-justify">
                                            {selectedDevice.detail}
                                        </p>
                                    </div>
                                </div>
                            </div>

                            {/* Simulation Controls Section - Nửa dưới */}
                            <div className="h-1/2 p-6 flex flex-col overflow-hidden bg-slate-50">
                                <h3 className="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4 border-b pb-2 flex items-center gap-2">
                                    <IconComponent name="play" size={16} className="text-indigo-600" /> Bảng Mô Phỏng Luồng
                                </h3>
                                
                                {!isPlaying && !activeScenario ? (
                                    <div className="space-y-3 overflow-y-auto pr-2 pb-6 custom-scrollbar">
                                        <p className="text-sm text-slate-500 mb-2 italic">Hãy chọn một kịch bản bên dưới để xem luồng đi của gói tin (Packet):</p>
                                        {scenarios.map(scen => (
                                            <button
                                                key={scen.id}
                                                onClick={() => startSimulation(scen)}
                                                className="w-full text-left p-4 bg-white border border-slate-200 rounded-xl hover:border-indigo-400 hover:shadow-md transition-all group relative overflow-hidden flex flex-col"
                                            >
                                                <div className="absolute top-0 left-0 w-1 h-full bg-indigo-500 transform origin-bottom scale-y-0 group-hover:scale-y-100 transition-transform"></div>
                                                <div className="font-bold text-slate-800 group-hover:text-indigo-700 ml-2">Kịch bản {scen.id}: {scen.title}</div>
                                                <div className="text-xs text-slate-500 mt-1 ml-2 bg-slate-50 inline-block p-1 rounded">{scen.desc}</div>
                                            </button>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="flex flex-col h-full overflow-hidden">
                                        <div className="bg-white border border-slate-200 shadow-sm p-3 rounded-xl mb-4 shrink-0 flex justify-between items-center">
                                            <div>
                                                <h4 className="font-bold text-indigo-900 text-sm mb-1">{activeScenario?.title}</h4>
                                                <div className="text-xs font-semibold text-slate-500 bg-slate-100 px-2 py-0.5 rounded inline-block">
                                                    Trạm dừng: {currentStep + 1} / {activeScenario.path.length}
                                                </div>
                                            </div>
                                            <button 
                                                onClick={stopSimulation}
                                                className="px-3 py-1.5 text-xs bg-slate-100 text-slate-600 hover:bg-red-500 hover:text-white rounded-lg font-bold transition-colors shadow-sm"
                                            >
                                                Kết thúc
                                            </button>
                                        </div>

                                        {/* FLOW MAP (MINDMAP) */}
                                        <div className="flex-1 overflow-y-auto bg-white border border-slate-200 rounded-xl p-4 sm:p-6 relative custom-scrollbar">
                                            <div className="absolute top-10 bottom-10 left-8 sm:left-10 w-1 bg-slate-100 rounded-full z-0"></div>

                                            {activeScenario.path.map((deviceId, idx) => {
                                                const device = devices[deviceId];
                                                const Icon = device.icon;
                                                const isActive = currentStep === idx;
                                                const isPassed = currentStep > idx;
                                                const isPending = currentStep < idx;
                                                const isLastNode = idx === activeScenario.path.length - 1;
                                                
                                                return (
                                                    <div key={idx} className="relative z-10 flex gap-4 sm:gap-6 mb-8 group">
                                                        
                                                        {/* Node Icon */}
                                                        <div className="relative flex flex-col items-center shrink-0 w-10 sm:w-12">
                                                            <div className={`w-10 h-10 sm:w-12 sm:h-12 rounded-full flex items-center justify-center border-4 transition-all duration-500 z-10 bg-white
                                                                ${isPassed ? 'border-indigo-500' : ''}
                                                                ${isActive ? 'border-yellow-400 ring-4 ring-yellow-100 scale-110 shadow-md' : ''}
                                                                ${isPending ? 'border-slate-200 grayscale opacity-50' : ''}
                                                            `}>
                                                                <div className="w-6 h-6 sm:w-8 sm:h-8"><Icon /></div>
                                                            </div>

                                                            {/* Connected Line active state */}
                                                            {!isLastNode && (
                                                                <div className={`absolute top-10 sm:top-12 w-1 h-[calc(100%+32px)] transition-colors duration-1000 -z-10
                                                                    ${isPassed ? 'bg-indigo-500' : 'bg-transparent'}
                                                                `}></div>
                                                            )}
                                                        </div>

                                                        {/* Node Content / Log */}
                                                        <div className={`flex-1 pt-1 transition-all duration-500 ${isPending ? 'opacity-40' : 'opacity-100'}`}>
                                                            <div className="font-bold text-slate-800 flex items-center gap-2 text-sm sm:text-base">
                                                                {device.name}
                                                                {isPassed && <IconComponent name="check-circle-2" size={16} className="text-indigo-500" />}
                                                            </div>
                                                            
                                                            {(isActive || isPassed) && (
                                                                <div className={`mt-2 text-xs sm:text-sm p-3 rounded-lg border leading-relaxed
                                                                    ${isActive ? 'bg-yellow-50 border-yellow-200 text-yellow-900 shadow-inner' : 'bg-slate-50 border-slate-100 text-slate-600'}
                                                                `}>
                                                                    {activeScenario.logs[deviceId]}
                                                                </div>
                                                            )}
                                                            
                                                            {/* Result Tag for Last Node */}
                                                            {isLastNode && (isActive || isPassed) && !isPlaying && (
                                                                <div className={`mt-3 inline-flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm font-bold animate-fadeIn shadow-sm
                                                                    ${activeScenario.status === 'success' ? 'bg-green-100 text-green-700 border border-green-200' : 'bg-red-100 text-red-700 border border-red-200'}
                                                                `}>
                                                                    {activeScenario.status === 'success' ? <IconComponent name="check-circle-2" size={18}/> : <IconComponent name="x-circle" size={18}/>}
                                                                    {activeScenario.status === 'success' ? 'Thành công: Gói tin đến đích!' : 'Thất bại: Gói tin bị Hủy (Dropped)!'}
                                                                </div>
                                                            )}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )}
                            </div>
                            
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
